name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Check if version already published
        id: check-npm
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          if npm view "@iyadhk/clauditor@${VERSION}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already published to npm, skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --provenance --access public
        if: steps.check-npm.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          TARBALL_URL="https://registry.npmjs.org/@iyadhk/clauditor/-/clauditor-${VERSION}.tgz"

          # Wait for npm registry to serve the correct version
          for i in $(seq 1 10); do
            TARBALL=$(curl -sL "$TARBALL_URL")
            FOUND_VERSION=$(echo "$TARBALL" | tar xzf - --to-stdout package/package.json 2>/dev/null | grep '"version"' | head -1 | sed 's/.*: *"//;s/".*//')
            if [ "$FOUND_VERSION" = "$VERSION" ]; then
              SHA256=$(echo "$TARBALL" | shasum -a 256 | awk '{print $1}')
              echo "Verified tarball version ${VERSION} with SHA ${SHA256}"
              break
            fi
            echo "npm returned version '${FOUND_VERSION}' instead of '${VERSION}' (attempt $i/10)..."
            sleep 30
          done

          if [ -z "$SHA256" ]; then
            echo "::error::Failed to get correct tarball from npm after 10 attempts"
            exit 1
          fi

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/IyadhKhalfallah/homebrew-clauditor.git /tmp/homebrew-clauditor
          cd /tmp/homebrew-clauditor

          sed -i 's|url ".*"|url "'"${TARBALL_URL}"'"|' Formula/clauditor.rb
          sed -i 's|sha256 ".*"|sha256 "'"${SHA256}"'"|' Formula/clauditor.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clauditor.rb
          git commit -m "clauditor ${VERSION}"
          git push

      - name: Append tweet draft to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"

          # Get current release body
          BODY=$(gh release view "$TAG" --json body -q .body)

          # Extract changelog bullets for context
          HIGHLIGHTS=$(echo "$BODY" | grep -E '^\* ' | head -5 | sed 's/^\* /  - /' | sed 's/ \[.*$//')

          # Append tweet draft
          read -r -d '' TWEET_SECTION << 'SECTION_EOF' || true

          ---

          ### 📋 Tweet draft (edit before posting)

          **What changed in this release:**
          SECTION_EOF

          TWEET_SECTION="${TWEET_SECTION}
          ${HIGHLIGHTS}

          **Draft tweet (copy, edit, post):**

          \`\`\`
          New clauditor update (v${VERSION}):

          [Write 1-2 sentences about the biggest change and why it matters to users]

          Run \`clauditor report\` to see your own data.

          npm install -g @iyadhk/clauditor
          \`\`\`

          > **Tips:** Lead with the user problem, not the feature. Use your own data as proof. Keep it under 280 chars."

          # Append to release
          UPDATED="${BODY}${TWEET_SECTION}"
          gh release edit "$TAG" --notes "$UPDATED"
